name: "🔍 Gizemi Çöz ve Deploy Et"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────
  # 🧪 Test — Cevapları Kontrol Et
  # ─────────────────────────────────────
  test:
    name: "🧪 Cevapları Kontrol Et"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Kodu indir"
        uses: actions/checkout@v4

      - name: "⚙️ Node.js kur"
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "📦 Bağımlılıkları yükle"
        run: npm install

      - name: "🔍 Vakaları kontrol et"
        run: npm test

  # ─────────────────────────────────────
  # 🚀 Deploy — Tüm Vakalar Doğruysa Yayınla
  # ─────────────────────────────────────
  deploy:
    name: "🚀 Siteyi Yayınla"
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "📥 Kodu indir"
        uses: actions/checkout@v4

      - name: "📄 GitHub Pages ayarla"
        uses: actions/configure-pages@v5

      - name: "📦 Dosyaları paketle"
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"

      - name: "🌐 GitHub Pages'a deploy et"
        id: deployment
        uses: actions/deploy-pages@v4
